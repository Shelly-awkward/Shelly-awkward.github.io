<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>即時字幕</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Noto Sans TC', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top bar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: #111;
    border-bottom: 1px solid #222;
    flex-shrink: 0;
  }
  .topbar-title { font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
  .topbar-status {
    display: flex; align-items: center; gap: 7px;
    font-size: 12px; color: #666;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; flex-shrink: 0; }
  .dot.rec  { background: #ef4444; animation: blink 1.2s ease-in-out infinite; }
  .dot.proc { background: #f59e0b; animation: blink 0.7s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
  .btn-gear {
    background: none; border: none; color: #555; font-size: 22px;
    cursor: pointer; padding: 4px 0 4px 16px; line-height: 1;
  }

  /* ── Subtitle area ── */
  .subtitle-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 24px 20px 20px;
    gap: 10px;
    overflow: hidden;
  }
  .prev-en { font-size: 18px; line-height: 1.6; color: #555; font-weight: 300; }
  .prev-zh { font-size: 16px; line-height: 1.6; color: #3a3a3a; font-weight: 300; }
  .cur-en  { font-size: 26px; line-height: 1.55; color: #fff; font-weight: 400; }
  .cur-zh  { font-size: 23px; line-height: 1.55; color: #f59e0b; font-weight: 400; }
  .placeholder { color: #333; font-size: 18px; }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 12px;
    padding: 16px 20px;
    background: #0a0a0a;
    border-top: 1px solid #1a1a1a;
    flex-shrink: 0;
  }
  .btn-main {
    flex: 1;
    padding: 18px;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-start { background: #f59e0b; color: #000; }
  .btn-stop  { background: #1a1a1a; color: #fca5a5; border: 1px solid #3a1a1a; }
  .btn-txt   {
    padding: 18px 20px;
    border: 1px solid #222;
    border-radius: 14px;
    background: #111;
    color: #888;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  .btn-txt:disabled { opacity: 0.3; }

  /* ── Settings panel (full-screen modal) ── */
  .settings-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: flex-end;
  }
  .settings-overlay.open { display: flex; }
  .settings-panel {
    background: #111;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-height: 80dvh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .settings-handle {
    width: 40px; height: 4px; background: #333;
    border-radius: 99px; margin: 0 auto 8px;
  }
  .s-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .s-input {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 14px 16px;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    outline: none;
  }
  .s-input:focus { border-color: #f59e0b; }
  .btn-save-key {
    width: 100%;
    padding: 14px;
    background: #f59e0b;
    color: #000;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    margin-top: 4px;
  }
  .save-ok { font-size: 13px; color: #22c55e; text-align: center; display: none; }
  .seg-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .seg-btn {
    padding: 10px 18px;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    background: #1a1a1a;
    color: #888;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .seg-btn.active { border-color: #f59e0b; color: #f59e0b; background: rgba(245,158,11,0.08); }
  .btn-close-settings {
    width: 100%;
    padding: 14px;
    background: #1a1a1a;
    color: #aaa;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
  }

  /* ── Error bar ── */
  .err-bar {
    display: none;
    background: rgba(239,68,68,0.15);
    border-top: 1px solid rgba(239,68,68,0.3);
    padding: 12px 20px;
    font-size: 13px;
    color: #fca5a5;
    line-height: 1.5;
    flex-shrink: 0;
  }
  .err-bar.show { display: block; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-title">即時雙語字幕</div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="topbar-status">
      <div class="dot" id="dot"></div>
      <span id="statusTxt">待機</span>
    </div>
    <button class="btn-gear" onclick="openSettings()">⚙️</button>
  </div>
</div>

<!-- Subtitle display -->
<div class="subtitle-wrap" id="subtitleWrap">
  <div class="prev-en" id="prevEn"></div>
  <div class="prev-zh" id="prevZh"></div>
  <div class="cur-en placeholder" id="curEn">按下「開始」後，英文字幕出現在這裡</div>
  <div class="cur-zh placeholder" id="curZh">中文翻譯顯示於此</div>
</div>

<!-- Error bar -->
<div class="err-bar" id="errBar"></div>

<!-- Controls -->
<div class="controls">
  <button class="btn-main btn-start" id="btnStart" onclick="startCapture()">▶ 開始</button>
  <button class="btn-main btn-stop"  id="btnStop"  onclick="stopCapture()" style="display:none">⏹ 停止</button>
  <button class="btn-txt" id="btnDl" onclick="downloadTxt()" disabled>下載逐字稿</button>
</div>

<!-- Settings overlay -->
<div class="settings-overlay" id="settingsOverlay" onclick="overlayClick(event)">
  <div class="settings-panel">
    <div class="settings-handle"></div>

    <div>
      <div class="s-label">OpenAI API Key <span style="color:#f59e0b;font-size:10px;letter-spacing:0;text-transform:none;">存在瀏覽器，不上傳</span></div>
      <input class="s-input" type="password" id="keyInput" placeholder="sk-...">
      <button class="btn-save-key" onclick="saveKey()" style="margin-top:10px;">儲存 Key</button>
      <div class="save-ok" id="saveOk">✓ 已儲存</div>
    </div>

    <div>
      <div class="s-label">每段辨識長度</div>
      <div class="seg-row">
        <button class="seg-btn" onclick="setSeg(5000,this)">5 秒</button>
        <button class="seg-btn active" onclick="setSeg(8000,this)">8 秒</button>
        <button class="seg-btn" onclick="setSeg(12000,this)">12 秒</button>
        <button class="seg-btn" onclick="setSeg(18000,this)">18 秒</button>
      </div>
    </div>

    <button class="btn-close-settings" onclick="closeSettings()">關閉</button>
  </div>
</div>

<script>
// ── Key ───────────────────────────────────────────────────────
function getKey() { return localStorage.getItem('live_openai_key') || ''; }
function saveKey() {
  const v = document.getElementById('keyInput').value.trim();
  if (v) { localStorage.setItem('live_openai_key', v); }
  const ok = document.getElementById('saveOk');
  ok.style.display = 'block';
  setTimeout(() => ok.style.display = 'none', 2000);
}
(function(){
  const k = localStorage.getItem('live_openai_key') || localStorage.getItem('meeting_openai') || '';
  if (k) document.getElementById('keyInput').value = k;
})();

// ── Settings ──────────────────────────────────────────────────
function openSettings()  { document.getElementById('settingsOverlay').classList.add('open'); }
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); }
function overlayClick(e) { if (e.target === document.getElementById('settingsOverlay')) closeSettings(); }

// ── Segment ───────────────────────────────────────────────────
let SEGMENT_MS = 8000;
function setSeg(ms, btn) {
  SEGMENT_MS = ms;
  document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Error ─────────────────────────────────────────────────────
function showErr(msg) {
  const b = document.getElementById('errBar');
  b.textContent = '⚠️ ' + msg;
  b.classList.add('show');
}
function clearErr() { document.getElementById('errBar').classList.remove('show'); }

// ── Status ────────────────────────────────────────────────────
function setStatus(type, text) {
  document.getElementById('dot').className = 'dot' + (type ? ' '+type : '');
  const s = document.getElementById('statusTxt');
  s.textContent = text;
  s.style.color = type==='rec' ? '#ef4444' : type==='proc' ? '#f59e0b' : '#555';
}

// ── Subtitle ──────────────────────────────────────────────────
let lastEn = '', lastZh = '';
function setSubtitle(en, zh) {
  if (en !== null) {
    if (lastEn) {
      document.getElementById('prevEn').textContent = lastEn;
      document.getElementById('prevZh').textContent = lastZh;
    }
    const ce = document.getElementById('curEn');
    const cz = document.getElementById('curZh');
    ce.textContent = en;
    ce.classList.remove('placeholder');
    cz.textContent = zh || '';
    cz.classList.remove('placeholder');
  } else if (zh !== null) {
    document.getElementById('curZh').textContent = zh;
  }
}
function commitSubtitle(en, zh) {
  lastEn = en; lastZh = zh;
}

// ── MIME ──────────────────────────────────────────────────────
function bestMime() {
  if (typeof MediaRecorder === 'undefined') return '';
  const list = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];
  for (const t of list) { try { if (MediaRecorder.isTypeSupported(t)) return t; } catch(e){} }
  return 'audio/mp4';
}
function mimeExt(mime) {
  if (!mime) return 'webm';
  if (mime.includes('ogg')) return 'ogg';
  if (mime.includes('mp4')) return 'm4a';
  return 'webm';
}

// ── State ─────────────────────────────────────────────────────
let mediaStream=null, mediaRecorder=null, audioChunks=[];
let isRecording=false, segTimer=null, dataInterval=null;
let startTime=null, segStart=null, logEntries=[];

// ── Start ─────────────────────────────────────────────────────
async function startCapture() {
  clearErr();
  if (!getKey()) { openSettings(); showErr('請先填入 OpenAI API Key 並按儲存。'); return; }
  if (typeof MediaRecorder === 'undefined') {
    showErr('此裝置不支援錄音。請更新 iOS 至 14.3 以上版本。'); return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
    mediaStream = stream;
    stream.getAudioTracks()[0].addEventListener('ended', stopCapture);

    isRecording = true;
    startTime = Date.now();
    logEntries = [];
    lastEn = ''; lastZh = '';

    document.getElementById('btnStart').style.display = 'none';
    document.getElementById('btnStop').style.display = '';
    document.getElementById('btnDl').disabled = true;
    document.getElementById('prevEn').textContent = '';
    document.getElementById('prevZh').textContent = '';
    document.getElementById('curEn').textContent = '聆聽中…';
    document.getElementById('curEn').classList.remove('placeholder');
    document.getElementById('curZh').textContent = '';
    document.getElementById('curZh').classList.remove('placeholder');

    setStatus('rec', '錄製中');
    launchSegment();
  } catch(e) {
    if (e.name === 'NotAllowedError') showErr('麥克風權限遭拒。請在 Safari 設定中允許此網站使用麥克風。');
    else showErr('啟動失敗：' + e.message);
  }
}

// ── Segment loop ──────────────────────────────────────────────
function launchSegment() {
  if (!isRecording) return;
  audioChunks = [];
  segStart = Date.now() - startTime;
  const mime = bestMime();
  try { mediaRecorder = new MediaRecorder(mediaStream, mime ? { mimeType: mime } : {}); }
  catch(e) { try { mediaRecorder = new MediaRecorder(mediaStream); } catch(e2) { showErr('錄音器建立失敗：'+e2.message); stopCapture(); return; } }

  mediaRecorder.ondataavailable = e => { if (e.data?.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onerror = e => showErr('錄音錯誤：' + (e.error?.message||'未知'));
  mediaRecorder.onstop = () => {
    clearInterval(dataInterval);
    const mimeType = mediaRecorder.mimeType || mime || 'audio/mp4';
    const blob = new Blob(audioChunks, { type: mimeType });
    const at = segStart;
    processSegment(blob, at).finally(() => { if (isRecording) launchSegment(); });
  };

  mediaRecorder.start();
  dataInterval = setInterval(() => {
    if (mediaRecorder?.state === 'recording') try { mediaRecorder.requestData(); } catch(e){}
  }, 500);
  segTimer = setTimeout(() => {
    clearInterval(dataInterval);
    if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
  }, SEGMENT_MS);
}

// ── Process segment ───────────────────────────────────────────
async function processSegment(blob, at) {
  if (blob.size < 1000) return;
  setStatus('proc', '辨識中');
  try {
    const key = getKey();
    const ext = mimeExt(blob.type || bestMime());
    const form = new FormData();
    form.append('file', new File([blob], `seg.${ext}`, { type: blob.type||'audio/mp4' }));
    form.append('model', 'whisper-1');
    form.append('prompt', 'International meeting. Preserve English technical terms.');

    const wRes = await fetch('https://api.openai.com/v1/audio/transcriptions', {
      method: 'POST', headers: { Authorization: `Bearer ${key}` }, body: form
    });
    if (!wRes.ok) {
      const err = await wRes.json().catch(()=>({}));
      if (wRes.status !== 400) showErr('Whisper 錯誤：' + (err?.error?.message || wRes.status));
      if (isRecording) setStatus('rec','錄製中');
      return;
    }
    const en = (await wRes.json()).text?.trim();
    if (!en) { if (isRecording) setStatus('rec','錄製中'); return; }

    setSubtitle(en, '翻譯中…');
    clearErr();

    const tRes = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { Authorization: `Bearer ${key}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gpt-4o-mini', max_tokens: 400,
        messages: [
          { role: 'system', content: '你是專業即時口譯。將英文口譯為繁體中文（台灣用語）。金融監理、IFRS、審計等專業術語保留英文縮寫並附中文。只輸出翻譯，不加解釋。' },
          { role: 'user', content: en }
        ]
      })
    });
    const zh = tRes.ok ? ((await tRes.json()).choices?.[0]?.message?.content?.trim() || '') : '';

    setSubtitle(en, zh || '（翻譯失敗）');
    commitSubtitle(en, zh);

    const t = formatTime(at);
    logEntries.push({ time: t, en, zh });
    document.getElementById('btnDl').disabled = false;
  } catch(e) {
    showErr('錯誤：' + e.message);
  }
  if (isRecording) setStatus('rec', '錄製中');
}

// ── Stop ──────────────────────────────────────────────────────
function stopCapture() {
  if (!isRecording) return;
  isRecording = false;
  clearTimeout(segTimer);
  clearInterval(dataInterval);
  if (mediaRecorder?.state !== 'inactive') mediaRecorder.stop();
  mediaStream?.getTracks().forEach(t => t.stop());
  mediaStream = null;
  document.getElementById('btnStart').style.display = '';
  document.getElementById('btnStop').style.display = 'none';
  setStatus('', '已停止');
}

// ── Download TXT ──────────────────────────────────────────────
function downloadTxt() {
  if (!logEntries.length) return;
  const date = new Date().toLocaleDateString('zh-TW');
  const txt = `即時雙語逐字稿　${date}\n${'─'.repeat(40)}\n\n` +
    logEntries.map(e => `[${e.time}]\n${e.en}\n${e.zh}`).join('\n\n');
  const url = URL.createObjectURL(new Blob([txt], { type: 'text/plain;charset=utf-8' }));
  const a = Object.assign(document.createElement('a'), { href: url, download: `逐字稿_${date}.txt` });
  a.click();
  URL.revokeObjectURL(url);
}

function formatTime(ms) {
  const s = Math.floor(ms/1000);
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
</script>
</body>
</html>
