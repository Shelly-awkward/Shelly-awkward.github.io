<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>即時字幕</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: #000; color: #fff;
    font-family: 'Noto Sans TC', sans-serif;
    height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
  }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; background: #111; border-bottom: 1px solid #1e1e1e; flex-shrink: 0;
  }
  .topbar-title { font-size: 15px; font-weight: 700; }
  .topbar-right  { display: flex; align-items: center; gap: 12px; }
  .topbar-status { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #555; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; flex-shrink: 0; }
  .dot.rec  { background: #ef4444; animation: blink 1.2s ease-in-out infinite; }
  .dot.proc { background: #f59e0b; animation: blink 0.7s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
  .rec-badge {
    font-size: 11px; color: #22c55e; font-weight: 600;
    background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.25);
    border-radius: 6px; padding: 3px 8px; display: none;
  }
  .rec-badge.show { display: inline; }
  .btn-gear { background: none; border: none; color: #555; font-size: 22px; cursor: pointer; padding: 4px 0 4px 8px; }
  .subtitle-wrap {
    flex: 1; display: flex; flex-direction: column; justify-content: flex-end;
    padding: 24px 20px 20px; gap: 10px; overflow: hidden;
  }
  .prev-en { font-size: 17px; line-height: 1.6; color: #3a3a3a; font-weight: 300; min-height: 1em; }
  .prev-zh { font-size: 15px; line-height: 1.6; color: #2a2a2a; font-weight: 300; min-height: 1em; }
  .cur-en  { font-size: 26px; line-height: 1.55; color: #fff; font-weight: 400; min-height: 1.5em; transition: opacity .15s; }
  .cur-zh  { font-size: 23px; line-height: 1.55; color: #f59e0b; font-weight: 400; min-height: 1.4em; }
  .interim { opacity: 0.4 !important; }
  .placeholder { color: #222 !important; }
  .err-bar {
    display: none; flex-shrink: 0;
    background: rgba(239,68,68,0.12); border-top: 1px solid rgba(239,68,68,0.25);
    padding: 12px 20px; font-size: 13px; color: #fca5a5; line-height: 1.5;
  }
  .err-bar.show { display: block; }
  .audio-wrap {
    display: none; flex-shrink: 0;
    background: #0d1a0d; border-top: 1px solid rgba(34,197,94,0.2);
    padding: 14px 20px; gap: 8px; flex-direction: column;
  }
  .audio-wrap.show { display: flex; }
  .audio-label { font-size: 12px; color: #22c55e; font-weight: 600; }
  .audio-hint  { font-size: 11px; color: #4a6a4a; line-height: 1.5; }
  audio { width: 100%; height: 40px; border-radius: 8px; }
  .controls {
    display: flex; gap: 10px; padding: 14px 20px 20px;
    background: #0a0a0a; border-top: 1px solid #1a1a1a;
    flex-shrink: 0; flex-wrap: wrap;
  }
  .btn-main {
    flex: 1; min-width: 100px; padding: 18px 12px;
    border: none; border-radius: 14px; font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .btn-start { background: #f59e0b; color: #000; }
  .btn-stop  { background: #1a1a1a; color: #fca5a5; border: 1px solid #3a1a1a; }
  .btn-sm {
    padding: 14px 16px; border: 1px solid #222; border-radius: 12px;
    background: #111; color: #777; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  .btn-sm:disabled { opacity: 0.3; cursor: default; }
  .btn-sm.green { border-color: rgba(34,197,94,0.4); color: #22c55e; background: rgba(34,197,94,0.06); }
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.82); z-index: 100; align-items: flex-end;
  }
  .overlay.open { display: flex; }
  .sheet {
    background: #111; border-radius: 20px 20px 0 0;
    padding: 20px 20px 44px; width: 100%;
    max-height: 85dvh; overflow-y: auto;
    display: flex; flex-direction: column; gap: 22px;
  }
  .handle { width: 40px; height: 4px; background: #2a2a2a; border-radius: 99px; margin: 0 auto 4px; }
  .s-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .s-note  { font-size: 12px; color: #444; line-height: 1.6; }
  .s-input {
    width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a;
    border-radius: 10px; padding: 14px 16px; color: #fff;
    font-family: 'Courier New', monospace; font-size: 14px; outline: none;
  }
  .s-input:focus { border-color: #f59e0b; }
  .btn-save-key {
    width: 100%; padding: 14px; background: #f59e0b; color: #000;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: inherit; margin-top: 10px;
  }
  .save-ok { font-size: 13px; color: #22c55e; text-align: center; display: none; margin-top: 6px; }
  .lang-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .lang-btn {
    padding: 10px 18px; border: 1px solid #2a2a2a; border-radius: 8px;
    background: #1a1a1a; color: #777; font-size: 13px; cursor: pointer; font-family: inherit;
  }
  .lang-btn.active { border-color: #f59e0b; color: #f59e0b; background: rgba(245,158,11,0.08); }
  .rec-toggle {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px; background: #1a1a1a;
    border: 1px solid #2a2a2a; border-radius: 12px; cursor: pointer;
  }
  .rec-toggle.on { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.05); }
  .toggle-sw {
    width: 40px; height: 22px; background: #333; border-radius: 99px;
    position: relative; transition: background .2s; flex-shrink: 0;
  }
  .toggle-sw::after {
    content:''; position: absolute; top: 3px; left: 3px;
    width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform .2s;
  }
  .rec-toggle.on .toggle-sw { background: #22c55e; }
  .rec-toggle.on .toggle-sw::after { transform: translateX(18px); }
  .toggle-label strong { display: block; font-size: 14px; margin-bottom: 3px; }
  .toggle-label span { font-size: 12px; color: #555; line-height: 1.5; }
  .btn-close {
    width: 100%; padding: 14px; background: #1a1a1a; color: #888;
    border: 1px solid #2a2a2a; border-radius: 12px; font-size: 15px;
    cursor: pointer; font-family: inherit;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">即時雙語字幕</div>
  <div class="topbar-right">
    <span class="rec-badge" id="recBadge">● 錄音中</span>
    <div class="topbar-status">
      <div class="dot" id="dot"></div>
      <span id="statusTxt">待機</span>
    </div>
    <button class="btn-gear" onclick="openSettings()">⚙️</button>
  </div>
</div>

<div class="subtitle-wrap">
  <div class="prev-en" id="prevEn"></div>
  <div class="prev-zh" id="prevZh"></div>
  <div class="cur-en placeholder" id="curEn">按下「開始」後字幕即時出現</div>
  <div class="cur-zh placeholder" id="curZh">中文翻譯顯示於此</div>
</div>

<div class="err-bar" id="errBar"></div>

<div class="audio-wrap" id="audioWrap">
  <div class="audio-label">🎙️ 錄音完成</div>
  <audio id="audioPlayer" controls></audio>
  <div class="audio-hint" id="audioHint"></div>
</div>

<div class="controls">
  <button class="btn-main btn-start" id="btnStart" onclick="startCapture()">▶ 開始</button>
  <button class="btn-main btn-stop"  id="btnStop"  onclick="stopCapture()" style="display:none">⏹ 停止</button>
  <button class="btn-sm" id="btnDl" onclick="downloadTxt()" disabled>逐字稿</button>
  <button class="btn-sm green" id="btnSaveAudio" onclick="saveAudio()" style="display:none">儲存錄音</button>
</div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="sheet">
    <div class="handle"></div>
    <div>
      <div class="s-label">OpenAI API Key <span style="color:#f59e0b;font-size:10px;letter-spacing:0;text-transform:none;">存於瀏覽器，不上傳</span></div>
      <input class="s-input" type="password" id="keyInput" placeholder="sk-...">
      <button class="btn-save-key" onclick="saveKey()">儲存 Key</button>
      <div class="save-ok" id="saveOk">✓ 已儲存</div>
    </div>
    <div>
      <div class="s-label">辨識語言</div>
      <div class="lang-row">
        <button class="lang-btn active" onclick="setLang('en-US',this)">英文</button>
        <button class="lang-btn" onclick="setLang('ja-JP',this)">日文</button>
        <button class="lang-btn" onclick="setLang('zh-TW',this)">中文</button>
        <button class="lang-btn" onclick="setLang('ko-KR',this)">韓文</button>
      </div>
      <div class="s-note" style="margin-top:8px;">辨識由瀏覽器即時處理，翻譯需 1-2 秒（GPT）。</div>
    </div>
    <div>
      <div class="s-label">同時錄音</div>
      <div class="rec-toggle" id="recToggle" onclick="toggleRec()">
        <div class="toggle-sw"></div>
        <div class="toggle-label">
          <strong id="recLabel">關閉 — 只做逐字稿</strong>
          <span>開啟後同時錄製完整音訊，停止後可播放或儲存。</span>
        </div>
      </div>
    </div>
    <button class="btn-close" onclick="closeSettings()">完成</button>
  </div>
</div>

<script>
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
              (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

// ── Key ───────────────────────────────────────────────────────
function getKey() { return localStorage.getItem('live_openai_key') || ''; }
function saveKey() {
  const v = document.getElementById('keyInput').value.trim();
  if (v) localStorage.setItem('live_openai_key', v);
  const ok = document.getElementById('saveOk');
  ok.style.display = 'block';
  setTimeout(() => ok.style.display = 'none', 2000);
}
(function(){
  const k = localStorage.getItem('live_openai_key') || localStorage.getItem('meeting_openai') || '';
  if (k) document.getElementById('keyInput').value = k;
})();

// ── Settings ──────────────────────────────────────────────────
function openSettings()  { document.getElementById('overlay').classList.add('open'); }
function closeSettings() { document.getElementById('overlay').classList.remove('open'); }
function overlayClick(e) { if (e.target===document.getElementById('overlay')) closeSettings(); }

let srLang = 'en-US';
function setLang(lang, btn) {
  srLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

let doRecord = false;
function toggleRec() {
  doRecord = !doRecord;
  document.getElementById('recToggle').classList.toggle('on', doRecord);
  document.getElementById('recLabel').textContent = doRecord ? '開啟 — 同時錄製音訊' : '關閉 — 只做逐字稿';
}

// ── Error / Status ────────────────────────────────────────────
function showErr(msg) {
  const b = document.getElementById('errBar');
  b.textContent = '⚠️ ' + msg; b.classList.add('show');
}
function clearErr() { document.getElementById('errBar').classList.remove('show'); }
function setStatus(type, text) {
  document.getElementById('dot').className = 'dot' + (type?' '+type:'');
  const s = document.getElementById('statusTxt');
  s.textContent = text;
  s.style.color = type==='rec'?'#ef4444':type==='proc'?'#f59e0b':'#555';
}

// ── MIME helpers ──────────────────────────────────────────────
function bestMime() {
  if (typeof MediaRecorder === 'undefined') return '';
  const list = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];
  for (const t of list) { try { if (MediaRecorder.isTypeSupported(t)) return t; } catch(e){} }
  return 'audio/mp4';
}
function mimeExt(mime) {
  if (!mime) return 'webm';
  if (mime.includes('ogg')) return 'ogg';
  if (mime.includes('mp4')) return 'm4a';
  return 'webm';
}

// ── State ─────────────────────────────────────────────────────
let recognition   = null;
let mediaStream   = null, fullRecorder = null, fullChunks = [], fullMime = '';
let isRecording   = false;
let pendingFinal  = '', translateTimer = null;
let lastEn = '', lastZh = '';
let startTime = null, logEntries = [];

// ── Session ID: prevents stale async callbacks ────────────────
let sessionId = 0;

// ── Start ─────────────────────────────────────────────────────
async function startCapture() {
  clearErr();
  document.getElementById('audioWrap').classList.remove('show');
  document.getElementById('btnSaveAudio').style.display = 'none';

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showErr('此裝置不支援語音辨識 API。請使用 iOS 14.5+ 或 Chrome。'); return; }
  if (!getKey()) { openSettings(); showErr('請先填入 OpenAI API Key。'); return; }

  // Bump session — invalidates all callbacks from previous session
  sessionId++;
  const mySession = sessionId;

  pendingFinal = '';
  lastEn = ''; lastZh = '';
  logEntries = [];

  // Start recording if enabled
  if (doRecord) {
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
      });
      fullMime = bestMime();
      try {
        fullRecorder = new MediaRecorder(mediaStream, fullMime ? { mimeType: fullMime, audioBitsPerSecond: 128000 } : {});
      } catch(e) {
        fullRecorder = new MediaRecorder(mediaStream); fullMime = '';
      }
      fullRecorder.ondataavailable = e => { if (e.data?.size > 0) fullChunks.push(e.data); };
      fullChunks = [];
      fullRecorder.start(1000);
      document.getElementById('recBadge').classList.add('show');
    } catch(e) {
      if (e.name==='NotAllowedError') { showErr('麥克風權限遭拒。'); return; }
      showErr('錄音啟動失敗：' + e.message); return;
    }
  }

  // Setup Speech Recognition
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = srLang;
  recognition.maxAlternatives = 1;

  // Capture session ID and recognition instance for this session's callbacks
  const myRecognition = recognition;

  recognition.onresult = (event) => {
    if (sessionId !== mySession) return; // stale session, ignore
    handleResult(event, mySession);
  };

  recognition.onerror = (e) => {
    if (sessionId !== mySession) return;
    if (e.error === 'no-speech') return;
    if (e.error === 'not-allowed') { showErr('麥克風權限遭拒。'); stopCapture(); return; }
    if (e.error === 'network') showErr('網路錯誤，嘗試重連…');
  };

  recognition.onend = () => {
    // Only restart if THIS session is still active AND it's still THIS recognition object
    if (isRecording && sessionId === mySession && recognition === myRecognition) {
      setTimeout(() => {
        if (isRecording && sessionId === mySession) {
          try { myRecognition.start(); } catch(e) {}
        }
      }, 200);
    }
  };

  try { recognition.start(); }
  catch(e) { showErr('語音辨識啟動失敗：' + e.message); return; }

  isRecording = true;
  startTime = Date.now();

  // UI
  document.getElementById('btnStart').style.display = 'none';
  document.getElementById('btnStop').style.display = '';
  document.getElementById('btnDl').disabled = true;
  document.getElementById('prevEn').textContent = '';
  document.getElementById('prevZh').textContent = '';
  const ce = document.getElementById('curEn');
  const cz = document.getElementById('curZh');
  ce.textContent = '聆聽中，請說話…'; ce.classList.remove('placeholder','interim');
  cz.textContent = ''; cz.classList.remove('placeholder');
  setStatus('rec', '錄製中');
}

// ── Handle SR result ──────────────────────────────────────────
function handleResult(event, mySession) {
  let interim = '';
  for (let i = event.resultIndex; i < event.results.length; i++) {
    const r = event.results[i];
    if (r.isFinal) {
      pendingFinal += r[0].transcript + ' ';
      clearTimeout(translateTimer);
      translateTimer = setTimeout(() => flushTranslate(mySession), 1500);
    } else {
      interim += r[0].transcript;
    }
  }
  const ce = document.getElementById('curEn');
  const display = (pendingFinal + interim).trim();
  if (display) {
    ce.textContent = display;
    ce.classList.remove('placeholder');
    ce.classList.toggle('interim', !pendingFinal && !!interim);
  }
}

// ── Flush & translate ─────────────────────────────────────────
async function flushTranslate(mySession) {
  const text = pendingFinal.trim();
  pendingFinal = '';
  if (!text) return;

  // Guard: if session has changed, discard this result
  if (sessionId !== mySession) return;

  document.getElementById('curEn').classList.remove('interim');
  document.getElementById('curZh').textContent = '翻譯中…';
  setStatus('proc', '翻譯中');

  try {
    const key = getKey();
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { Authorization: `Bearer ${key}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gpt-4o-mini', max_tokens: 400,
        messages: [
          { role: 'system', content: '你是專業即時口譯。將以下語言口譯為繁體中文（台灣用語）。金融監理、IFRS、審計等專業術語保留英文縮寫並附中文。語音辨識可能有小錯誤，請自動修正後翻譯。只輸出翻譯，不加解釋。' },
          { role: 'user', content: text }
        ]
      })
    });

    // Check session is still valid after await
    if (sessionId !== mySession) return;

    const zh = res.ok ? ((await res.json()).choices?.[0]?.message?.content?.trim()||'') : '';

    // One more check after second await
    if (sessionId !== mySession) return;

    if (lastEn) {
      document.getElementById('prevEn').textContent = lastEn;
      document.getElementById('prevZh').textContent = lastZh;
    }
    document.getElementById('curEn').textContent = text;
    document.getElementById('curZh').textContent = zh || '（翻譯失敗）';
    lastEn = text; lastZh = zh;

    logEntries.push({ time: formatTime(Date.now() - startTime), en: text, zh });
    document.getElementById('btnDl').disabled = false;
    clearErr();
  } catch(e) {
    if (sessionId !== mySession) return;
    showErr('翻譯錯誤：' + e.message);
    document.getElementById('curZh').textContent = '';
  }

  if (isRecording && sessionId === mySession) setStatus('rec', '錄製中');
}

// ── Stop ──────────────────────────────────────────────────────
function stopCapture() {
  if (!isRecording) return;
  isRecording = false;

  // Bump session to invalidate all in-flight callbacks
  sessionId++;

  clearTimeout(translateTimer);

  if (recognition) {
    try { recognition.abort(); } catch(e){}
    recognition = null;
  }

  document.getElementById('recBadge').classList.remove('show');

  if (doRecord && fullRecorder) {
    if (fullRecorder.state !== 'inactive') {
      fullRecorder.onstop = showAudioPlayer;
      fullRecorder.stop();
    } else { showAudioPlayer(); }
  }

  mediaStream?.getTracks().forEach(t => t.stop());
  mediaStream = null;

  document.getElementById('btnStart').style.display = '';
  document.getElementById('btnStop').style.display = 'none';
  setStatus('', '已停止');
}

// ── Audio player ──────────────────────────────────────────────
function showAudioPlayer() {
  if (!fullChunks.length) return;
  const mime = fullRecorder?.mimeType || fullMime || 'audio/mp4';
  const blob = new Blob(fullChunks, { type: mime });
  document.getElementById('audioPlayer').src = URL.createObjectURL(blob);
  document.getElementById('audioWrap').classList.add('show');
  document.getElementById('btnSaveAudio').style.display = '';
  document.getElementById('audioHint').textContent = isIOS
    ? 'iOS：播放器右下角按 ⋯ → 分享 → 儲存至「檔案」'
    : '點「儲存錄音」下載音訊檔案';
}

function saveAudio() {
  if (!fullChunks.length) return;
  const mime = fullRecorder?.mimeType || fullMime || 'audio/mp4';
  const blob = new Blob(fullChunks, { type: mime });
  const url  = URL.createObjectURL(blob);
  const date = new Date().toLocaleDateString('zh-TW').replace(/\//g,'-');
  if (isIOS) { window.open(url, '_blank'); }
  else { Object.assign(document.createElement('a'),{href:url,download:`會議錄音_${date}.${mimeExt(mime)}`}).click(); URL.revokeObjectURL(url); }
}

// ── Download TXT ──────────────────────────────────────────────
function downloadTxt() {
  if (!logEntries.length) return;
  const date = new Date().toLocaleDateString('zh-TW');
  const txt  = `即時雙語逐字稿　${date}\n${'─'.repeat(40)}\n\n` +
    logEntries.map(e=>`[${e.time}]\n${e.en}\n${e.zh}`).join('\n\n');
  const url  = URL.createObjectURL(new Blob([txt],{type:'text/plain;charset=utf-8'}));
  Object.assign(document.createElement('a'),{href:url,download:`逐字稿_${date}.txt`}).click();
  URL.revokeObjectURL(url);
}

function formatTime(ms) {
  const s = Math.floor(ms/1000);
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
</script>
</body>
</html>
